# Multiplayer latent world model: an inner LatentWorldModel that processes `n_players` per-player
# clips tiled into one vertically-stacked frame. The frozen codec runs per player at the original
# single-player resolution; the diffusion transformer sees the full tiled grid. Because the
# transformer uses RoPE (resolution-independent), a single-player checkpoint warm-starts into this
# model via `run.finetune_from` -- see MultiWrapperWorldModel.load_state_dict.
#
# The inner architecture size is selected via package-override on the nested wm_config; `1b` mirrors
# the single-player default. Use with `dataset.n_players=4` so the loader emits 4 contiguous,
# player-id-ordered perspectives per group (the consistency check enforces the match).
defaults:
  - latent_world_model@architecture.config.wm_config: 1b

architecture:
  _target_: mira.world_model.multi_wrapper_world_model.MultiWrapperWorldModel
  _convert_: all  # pass plain dicts to the Pydantic config, not OmegaConf nodes

  config:
    _target_: mira.world_model.multi_wrapper_world_model.MultiWrapperWorldModelConfig

    n_players: 4

    wm_config:
      _target_: mira.world_model.config.LatentWorldModelConfig

      # The action vocabulary travels with the dataset.
      actions: ${dataset.actions}

      video:
        _target_: mira.ml.image_config.ImageConfig
        # Single-player height; the wrapper multiplies it by n_players for the tiled inner model
        # while the codec keeps this original height (it runs per player).
        height: 288
        width: 512
        channels: 3
        timesteps: 80
        # Frame rate the world model sees. action_temporal_downsampling = actions.target_fps *
        # codec_temporal_downsampling // fps sets how many actions map to each latent frame; with
        # 20fps actions and a td=2 codec that is 20*2//20 = 2 actions per latent frame.
        fps: 20

      # Path or W&B URL to the frozen codec checkpoint; required at train/eval time (override on the
      # command line). null is a placeholder so the config composes without a checkpoint.
      codec_checkpoint: null
      # Estimated during codec training and saved in the codec checkpoint, so null here for new codecs.
      latent_mean_std: null

      # Fine-tuning from a single-player baseline requires matching the baseline's architecture
      # values (patch size, register tokens, attention gating).
      patch_size: 1
      n_register_tokens: 0
      attention_gating: true

      n_context_frames: 78  # only used during inference
      dropout_action_prob: 0.1
      # Drop each player's actions independently (with dropout_action_prob). On a drop,
      # action_subset_drop_prob is the chance only the Q/E/Space/Shift/Ctrl subset is dropped
      # (keeping WASD + mouse) rather than the player's whole action stream.
      dropout_action_per_player: true
      action_subset_drop_prob: 0.5
      learned_temporal_pool: true
      causal: true
      use_codec_posterior_mean: true
      # Recompute transformer-layer activations in the backward pass to fit the larger tiled
      # (multi-player) sequence.
      activation_checkpointing: true
      # AdaLN conditioning on the attention sublayers as well as the MLP.
      ada_attn_ln: true
      # PSD-M self-distillation. Two mutually-exclusive ways to mix it in (both 0 = disabled):
      #   psd_loss_prob: STOCHASTIC, add the (unweighted) PSD loss on a fraction of steps.
      #   psd_weight:    DETERMINISTIC, add psd_weight * loss_psd every step.
      # See https://arxiv.org/abs/2505.18825 and https://arxiv.org/abs/2410.12557
      psd_loss_prob: 0.0
      psd_weight: 0.0
      # Condition each denoising step on the clean latents of the previous frames (avoids the
      # train/inference mismatch in diffusion forcing).
      use_clean_past: true
